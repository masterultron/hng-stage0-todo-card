<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frontend Wizard - Stage 0</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <main class="container">
        <article class="todo-card" data-testid="test-todo-card">
            
            <div class="card-header">
                <div class="title-group">
                    <h2 data-testid="test-todo-title" id="task-title">Finish Stage 0 Task</h2>
                    <p data-testid="test-todo-description">Complete the todo item card with all required test IDs and accessibility features.</p>
                </div>
                <span class="priority-badge" data-testid="test-todo-priority" aria-label="High Priority">High</span>
            </div>

            <div class="card-body">
                <div class="date-info">
                    <time data-testid="test-todo-due-date" datetime="2026-04-16T18:00">Due Apr 16, 2026</time>
                    <span class="time-hint" data-testid="test-todo-time-remaining" aria-live="polite">Calculating...</span>
                </div>

                <div class="status-row">
                    <span class="status-label" data-testid="test-todo-status">Pending</span>
                    <label class="checkbox-container">
                        <input type="checkbox" data-testid="test-todo-complete-toggle" id="complete-checkbox">
                        <span class="label-text">Mark as done</span>
                    </label>
                </div>

                <ul class="tag-list" data-testid="test-todo-tags" role="list">
                    <li class="tag" data-testid="test-todo-tag-work">Work</li>
                    <li class="tag" data-testid="test-todo-tag-urgent">Urgent</li>
                </ul>
            </div>

            <div class="card-actions">
                <button class="btn edit-btn" data-testid="test-todo-edit-button" aria-label="Edit Task">
                    Edit
                </button>
                <button class="btn delete-btn" data-testid="test-todo-delete-button" aria-label="Delete Task">
                    Delete
                </button>
            </div>
        </article>
    </main>

    <script src="script.js"></script>
    
</body>
</html>
